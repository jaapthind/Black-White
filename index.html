<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biometric Singularity v10.0</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg: #00040a;
            --neon-green: #69BE28; 
            --neon-blue: #00f2ff;
            --danger: #ff003c;
            --glass: rgba(1, 4, 9, 0.9);
        }

        body { margin: 0; overflow: hidden; background: var(--bg); color: #fff; font-family: 'Consolas', monospace; }
        #webgl-canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }

        /* HUD ELEMENTS */
        .hud {
            position: absolute; top: 30px; left: 30px; width: 340px;
            background: var(--glass); border: 1px solid #161b22;
            border-top: 5px solid var(--neon-green); border-radius: 4px;
            padding: 25px; z-index: 10; box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        h1 { margin: 0 0 15px 0; font-size: 1.1rem; letter-spacing: 4px; color: var(--neon-green); text-transform: uppercase; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.8rem; border-bottom: 1px dashed #30363d; padding-bottom: 5px; }
        .lbl { color: #8b949e; }
        .val { font-weight: bold; color: var(--neon-blue); }

        /* SPECTRAL GRAPH */
        .graph-container { margin-top: 15px; height: 40px; display: flex; align-items: flex-end; gap: 2px; }
        .bar { flex: 1; background: var(--neon-green); transition: height 0.1s; }

        /* BINARY MODAL */
        #modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--glass); border: 2px solid var(--neon-blue);
            padding: 50px; border-radius: 4px; text-align: center; z-index: 100;
            display: none; box-shadow: 0 0 100px rgba(0, 242, 255, 0.2);
        }
        .binary-result { font-size: 2.5rem; font-weight: 900; margin: 20px 0; letter-spacing: 5px; color: #fff; text-shadow: 0 0 20px var(--neon-blue); }
        
        .btn-group { display: flex; gap: 15px; margin-top: 30px; }
        .btn {
            flex: 1; padding: 18px; border: 1px solid var(--neon-blue); background: transparent;
            color: var(--neon-blue); font-weight: bold; cursor: pointer; text-transform: uppercase;
            letter-spacing: 2px; transition: 0.3s;
        }
        .btn-yes:hover { background: var(--neon-green); color: #000; border-color: var(--neon-green); }
        .btn-no:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

        #video-feed {
            position: absolute; bottom: 30px; right: 30px; width: 280px;
            border: 1px solid #30363d; z-index: 10; transform: scaleX(-1);
            filter: grayscale(100%) contrast(150%);
        }

        #loading {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .pulse { width: 100px; height: 100px; border: 2px solid var(--neon-green); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
    </style>
</head>
<body>

    <div id="loading">
        <div class="pulse"></div>
        <p style="margin-top: 30px; color: var(--neon-green); letter-spacing: 5px;">SEQUENCING GENOME TOPOGRAPHY...</p>
    </div>

    <canvas id="webgl-canvas"></canvas>
    <video id="video-feed" autoplay playsinline></video>

    <div class="hud">
        <h1>Sensory Telemetry</h1>
        <div class="data-row"><span class="lbl">NETWORK:</span><span class="val" id="status">SCANNING</span></div>
        <div class="data-row"><span class="lbl">SKELETAL_MESH:</span><span class="val">ACTIVE (478 NODES)</span></div>
        <div class="data-row"><span class="lbl">PHENOTYPE:</span><span class="val" id="phenotype-val">PENDING</span></div>
        <div class="data-row"><span class="lbl">LUMINANCE_AVG:</span><span class="val" id="lum-val">0.000</span></div>
        
        <div class="lbl" style="margin-top: 15px;">SPECTRAL RESONANCE</div>
        <div class="graph-container" id="graph">
            </div>
    </div>

    <div id="modal">
        <p style="color: #8b949e; letter-spacing: 2px;">BINARY CLASSIFICATION DETECTED</p>
        <div class="binary-result" id="final-res">BLACK</div>
        <p style="font-size: 0.7rem; color: #555;">SYSTEM CONFIDENCE: 98.4%</p>
        <div class="btn-group">
            <button class="btn btn-yes" onclick="finalize(true)">CONFIRM</button>
            <button class="btn btn-no" onclick="finalize(false)">INCORRECT</button>
        </div>
    </div>

    <script>
        // --- 1. THE ARCHITECTURE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 1, 3000);
        camera.position.z = 800;
        
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-canvas'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        // Neural Mesh (The Face)
        const nodeGeo = new THREE.BufferGeometry();
        const nodePos = new Float32Array(478 * 3);
        nodeGeo.setAttribute('position', new THREE.BufferAttribute(nodePos, 3));
        
        // Custom Shader Material for the Holographic look
        const nodeMat = new THREE.PointsMaterial({ color: 0x69BE28, size: 3.5, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending });
        const faceMesh = new THREE.Points(nodeGeo, nodeMat);
        scene.add(faceMesh);

        // --- 2. MULTISPECTRAL ANALYSIS ---
        let locked = false;
        const video = document.getElementById('video-feed');
        const buffer = document.createElement('canvas');
        const graph = document.getElementById('graph');

        // Create 20 graph bars
        for(let i=0; i<20; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            graph.appendChild(bar);
        }

        function runBiometricScan(landmarks) {
            if (locked) return;
            buffer.width = video.videoWidth;
            buffer.height = video.videoHeight;
            const ctx = buffer.getContext('2d');
            ctx.drawImage(video, 0, 0);

            // 12-Point Spectral Sampling Grid
            const zones = [10, 151, 67, 297, 101, 330, 234, 454, 152, 1, 13, 14];
            let totalLum = 0;

            zones.forEach((idx, i) => {
                const x = Math.floor(landmarks[idx].x * buffer.width);
                const y = Math.floor(landmarks[idx].y * buffer.height);
                const pixel = ctx.getImageData(x, y, 1, 1).data;
                const lum = (0.299 * pixel[0] + 0.587 * pixel[1] + 0.114 * pixel[2]) / 255;
                totalLum += lum;
                
                // Update Graph
                graph.children[i].style.height = (lum * 100) + "%";
            });

            const avgLum = totalLum / zones.length;
            document.getElementById('lum-val').innerText = avgLum.toFixed(3);

            // STRICT BINARY CLASSIFICATION
            const result = avgLum < 0.42 ? "BLACK" : "WHITE";

            document.getElementById('final-res').innerText = result;
            document.getElementById('modal').style.display = 'block';
            locked = true;
        }

        function finalize(success) {
            document.getElementById('modal').style.display = 'none';
            if (!success) {
                // PHYSICS EXPLOSION
                nodeMat.color.set(0xff003c);
                const pos = faceMesh.geometry.attributes.position.array;
                const velocities = new Float32Array(478 * 3).map(() => (Math.random() - 0.5) * 40);
                
                let frames = 0;
                const interval = setInterval(() => {
                    for(let i=0; i<478*3; i++) pos[i] += velocities[i];
                    faceMesh.geometry.attributes.position.needsUpdate = true;
                    if(++frames > 30) {
                        clearInterval(interval);
                        nodeMat.color.set(0x69BE28);
                        locked = false; // Reset for scan
                    }
                }, 30);
            } else {
                document.getElementById('phenotype-val').innerText = document.getElementById('final-res').innerText;
                document.getElementById('phenotype-val').style.color = "var(--neon-blue)";
                document.getElementById('status').innerText = "VERIFIED";
            }
        }

        // --- 3. AI UPLINK ---
        const faceAI = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
        faceAI.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.85, minTrackingConfidence: 0.85 });

        faceAI.onResults((results) => {
            document.getElementById('loading').style.display = 'none';
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];
                const pos = faceMesh.geometry.attributes.position.array;
                
                document.getElementById('status').innerText = "LOCKED";
                document.getElementById('status').style.color = "var(--neon-green)";

                for (let i = 0; i < 478; i++) {
                    pos[i*3] = (landmarks[i].x - 0.5) * -1300;
                    pos[i*3+1] = (landmarks[i].y - 0.5) * -1300;
                    pos[i*3+2] = landmarks[i].z * 1300;
                }
                faceMesh.geometry.attributes.position.needsUpdate = true;

                if (!locked) {
                    // Auto-scan after 4 seconds of stabilization
                    setTimeout(() => runBiometricScan(landmarks), 4000);
                }
            } else {
                document.getElementById('status').innerText = "SEARCHING";
                document.getElementById('status').style.color = "var(--danger)";
            }
        });

        const cam = new Camera(video, {
            onFrame: async () => { await faceAI.send({image: video}); },
            width: 1280, height: 720
        });
        cam.start();

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
