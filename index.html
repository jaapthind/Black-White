<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAA WebGL Avatar Engine</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg: #050505;
            --accent: #00ffcc;
            --panel: rgba(15, 15, 20, 0.85);
        }
        body { margin: 0; overflow: hidden; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; }
        
        #webgl-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        #video-feed { display: none; } /* Hidden, read purely by AI */

        /* Advanced UI Overlay */
        #ui-panel {
            position: absolute; top: 20px; right: 20px; width: 350px;
            background: var(--panel); backdrop-filter: blur(15px);
            border: 1px solid #333; border-radius: 15px; padding: 25px;
            z-index: 10; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; gap: 15px;
        }

        h1 { margin: 0; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .status { font-family: monospace; color: var(--accent); font-size: 0.9rem; }
        
        label { font-size: 0.8rem; font-weight: bold; text-transform: uppercase; color: #888; }
        select, input[type="color"] {
            width: 100%; padding: 12px; background: #000; color: #fff;
            border: 1px solid #444; border-radius: 8px; font-size: 1rem; cursor: pointer;
        }

        .btn {
            background: linear-gradient(90deg, #00ffcc, #0088ff);
            color: #000; font-weight: 900; text-transform: uppercase;
            border: none; padding: 15px; border-radius: 8px; cursor: pointer;
            transition: 0.2s; margin-top: 10px;
        }
        .btn:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(0, 255, 204, 0.4); }

        #loading {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .spinner { width: 50px; height: 50px; border: 3px solid #333; border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <h2 style="margin-top: 20px; color: #888;">Initializing Neural Models & WebGL...</h2>
        <p>Ensure you are on a secure HTTPS server (GitHub Pages)</p>
    </div>

    <video id="video-feed" autoplay playsinline></video>
    <div id="webgl-container"></div>

    <div id="ui-panel">
        <h1>3D Holographic Studio</h1>
        <div class="status" id="ai-status">AI: Awaiting Camera Permission...</div>

        <div>
            <label>Skin / Mesh Material</label>
            <input type="color" id="meshColor" value="#ffcda0">
        </div>

        <div>
            <label>3D Headwear</label>
            <select id="headwear">
                <option value="none">None</option>
                <option value="patka">Turban / Joora Knot (3D)</option>
                <option value="cap">Snapback Cap (3D)</option>
            </select>
        </div>

        <div>
            <label>Headwear Color</label>
            <input type="color" id="hatColor" value="#111111">
        </div>

        <div>
            <label>Outfit (Torso Geometry)</label>
            <select id="outfit">
                <option value="jersey">Pro Sports Jersey</option>
                <option value="cyber">Cyberpunk Armor</option>
            </select>
        </div>
        
        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>Primary</label>
                <input type="color" id="outfitColor1" value="#002244">
            </div>
            <div style="flex: 1;">
                <label>Trim</label>
                <input type="color" id="outfitColor2" value="#69BE28">
            </div>
        </div>

        <button class="btn" id="export-btn">Take 3D Snapshot</button>
    </div>

    <script>
        // ==========================================
        // 1. THREE.JS 3D ENVIRONMENT SETUP
        // ==========================================
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        // Add subtle fog to blend into the background
        scene.fog = new THREE.FogExp2(0x050505, 0.002);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.z = 500;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(0, 200, 100);
        scene.add(dirLight);
        const pointLight = new THREE.PointLight(0x00ffcc, 1, 500);
        pointLight.position.set(0, -100, 200);
        scene.add(pointLight);

        // ==========================================
        // 2. PROCEDURAL 3D FACE MESH CONSTRUCTION
        // ==========================================
        // We create a master group that will hold the face and all accessories.
        // This group will rotate and move based on your actual head movements.
        const headGroup = new THREE.Group();
        scene.add(headGroup);

        // The Face Mesh (468 vertices)
        const faceGeometry = new THREE.BufferGeometry();
        const positions = new Float32Array(468 * 3);
        faceGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        
        // Advanced Material: Glowing wireframe + solid points
        const faceMaterial = new THREE.PointsMaterial({ 
            color: 0xffcda0, size: 3, transparent: true, opacity: 0.9 
        });
        const faceCloud = new THREE.Points(faceGeometry, faceMaterial);
        headGroup.add(faceCloud);

        // ==========================================
        // 3. 3D ACCESSORY GENERATION (Headwear & Torso)
        // ==========================================
        const hatMaterial = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.7 });
        const outfitMat1 = new THREE.MeshStandardMaterial({ color: 0x002244 });
        const outfitMat2 = new THREE.MeshStandardMaterial({ color: 0x69BE28 });

        // --- The Turban / Joora ---
        const jooraGroup = new THREE.Group();
        // Base wrap (semi-sphere)
        const wrapGeo = new THREE.SphereGeometry(75, 32, 16, 0, Math.PI * 2, 0, Math.PI * 0.5);
        const wrapMesh = new THREE.Mesh(wrapGeo, hatMaterial);
        wrapMesh.position.y = 20;
        wrapMesh.rotation.x = -0.2;
        jooraGroup.add(wrapMesh);
        // Top Knot
        const knotGeo = new THREE.TorusGeometry(20, 15, 16, 32);
        const knotMesh = new THREE.Mesh(knotGeo, hatMaterial);
        knotMesh.position.set(0, 85, -10);
        knotMesh.rotation.x = Math.PI / 2;
        jooraGroup.add(knotMesh);
        jooraGroup.visible = false;
        headGroup.add(jooraGroup);

        // --- The Cap ---
        const capGroup = new THREE.Group();
        const domeGeo = new THREE.SphereGeometry(70, 32, 16, 0, Math.PI * 2, 0, Math.PI * 0.5);
        const domeMesh = new THREE.Mesh(domeGeo, hatMaterial);
        domeMesh.position.y = 30;
        capGroup.add(domeMesh);
        const brimGeo = new THREE.CylinderGeometry(75, 75, 5, 32, 1, false, 0, Math.PI);
        const brimMesh = new THREE.Mesh(brimGeo, hatMaterial);
        brimMesh.position.set(0, 30, 20);
        brimMesh.scale.set(1, 1, 1.5);
        capGroup.add(brimMesh);
        capGroup.visible = false;
        headGroup.add(capGroup);

        // --- The Torso (Jersey) ---
        // Attached to the scene, not the head, so it stays relatively still
        const torsoGroup = new THREE.Group();
        const chestGeo = new THREE.CylinderGeometry(90, 120, 200, 32);
        const chestMesh = new THREE.Mesh(chestGeo, outfitMat1);
        chestMesh.position.y = -200;
        torsoGroup.add(chestMesh);
        
        // V-Neck Trim
        const trimGeo = new THREE.TorusGeometry(60, 8, 16, 32);
        const trimMesh = new THREE.Mesh(trimGeo, outfitMat2);
        trimMesh.position.set(0, -100, 75);
        trimMesh.rotation.x = Math.PI / 4;
        torsoGroup.add(trimMesh);
        scene.add(torsoGroup);

        // ==========================================
        // 4. UI EVENT LISTENERS
        // ==========================================
        document.getElementById('meshColor').addEventListener('input', (e) => { faceMaterial.color.set(e.target.value); });
        document.getElementById('hatColor').addEventListener('input', (e) => { hatMaterial.color.set(e.target.value); });
        document.getElementById('outfitColor1').addEventListener('input', (e) => { outfitMat1.color.set(e.target.value); });
        document.getElementById('outfitColor2').addEventListener('input', (e) => { outfitMat2.color.set(e.target.value); });
        
        document.getElementById('headwear').addEventListener('change', (e) => {
            jooraGroup.visible = false;
            capGroup.visible = false;
            if (e.target.value === 'patka') jooraGroup.visible = true;
            if (e.target.value === 'cap') capGroup.visible = true;
        });

        // ==========================================
        // 5. GOOGLE MEDIAPIPE AI TRACKING
        // ==========================================
        const videoElement = document.getElementById('video-feed');
        const aiStatus = document.getElementById('ai-status');

        const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

        faceMesh.onResults((results) => {
            document.getElementById('loading').style.display = 'none';
            
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                aiStatus.innerText = "AI: 468 Nodes Locked & Tracking";
                aiStatus.style.color = "#00ffcc";
                
                const landmarks = results.multiFaceLandmarks[0];
                const posArray = faceCloud.geometry.attributes.position.array;
                
                // Track center of face to move the whole head group
                let centerX = 0, centerY = 0, centerZ = 0;

                // Map 2D AI data to 3D WebGL space
                for (let i = 0; i < landmarks.length; i++) {
                    const x = (landmarks[i].x - 0.5) * -400; // Scaled for 3D view
                    const y = (landmarks[i].y - 0.5) * -400;
                    const z = landmarks[i].z * 400;

                    posArray[i * 3] = x;
                    posArray[i * 3 + 1] = y;
                    posArray[i * 3 + 2] = z;

                    if (i === 1) { // Node 1 is the tip of the nose
                        centerX = x; centerY = y; centerZ = z;
                    }
                }
                faceCloud.geometry.attributes.position.needsUpdate = true;

                // Calculate Head Rotation based on specific nodes (eyes and chin)
                const leftEye = landmarks[133];
                const rightEye = landmarks[362];
                const chin = landmarks[152];
                
                // Apply rotation to the accessories so they follow your head
                const rotX = (chin.z - leftEye.z) * 2;
                const rotY = (leftEye.z - rightEye.z) * 2;
                const rotZ = (leftEye.y - rightEye.y) * 2;

                jooraGroup.position.set(centerX, centerY + 80, centerZ - 20);
                jooraGroup.rotation.set(rotX, rotY, rotZ);

                capGroup.position.set(centerX, centerY + 60, centerZ - 20);
                capGroup.rotation.set(rotX, rotY, rotZ);

            } else {
                aiStatus.innerText = "AI: Searching for face...";
                aiStatus.style.color = "#ff3366";
            }
        });

        const camFeed = new Camera(videoElement, {
            onFrame: async () => { await faceMesh.send({image: videoElement}); },
            width: 1280, height: 720
        });
        camFeed.start();

        // ==========================================
        // 6. RENDER & EXPORT
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);
            // Slowly rotate torso for 3D showcase effect
            torsoGroup.rotation.y = Math.sin(Date.now() * 0.001) * 0.2;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        document.getElementById('export-btn').addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = '3D_WebGL_Avatar.png';
            link.href = renderer.domElement.toDataURL('image/png');
            link.click();
        });
    </script>
</body>
</html>
