<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Face Node Playground v2.0</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        :root {
            /* High-Tech Navy & Action Green Aesthetic */
            --bg-deep: #000c1a;
            --bg-panel: rgba(0, 18, 40, 0.75);
            --neon-green: #69BE28;
            --neon-blue: #00aaff;
            --text-main: #e6f2ff;
            --border-glow: 0 0 15px rgba(105, 190, 40, 0.3);
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        #webgl-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* --- DIAGNOSTIC HUD OVERLAYS --- */
        .hud-panel {
            position: absolute;
            background: var(--bg-panel);
            border: 1px solid var(--neon-green);
            box-shadow: var(--border-glow);
            backdrop-filter: blur(8px);
            padding: 20px;
            z-index: 10;
            border-radius: 4px;
        }

        #top-left-hud {
            top: 20px;
            left: 20px;
            width: 280px;
        }

        #bottom-right-hud {
            bottom: 20px;
            right: 20px;
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            color: var(--neon-green);
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px dashed var(--neon-green);
            padding-bottom: 5px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }

        .data-label { color: var(--neon-blue); }
        .data-value { font-weight: bold; color: #fff; text-shadow: 0 0 5px var(--neon-green); }

        /* Raw Camera Feed (Picture-in-Picture) */
        #cam-pip {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 200px;
            height: 150px;
            border: 1px solid var(--neon-blue);
            border-radius: 4px;
            z-index: 10;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 170, 255, 0.2);
        }

        #video-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            filter: grayscale(100%) contrast(120%);
        }

        /* Crosshair */
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            pointer-events: none;
            z-index: 5;
        }
        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background: rgba(105, 190, 40, 0.3);
        }
        .crosshair::before { top: 50%; left: 0; width: 100%; height: 1px; }
        .crosshair::after { top: 0; left: 50%; width: 1px; height: 100%; }

        #loading-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-deep);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(0, 170, 255, 0.2);
            border-top-color: var(--neon-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .btn {
            background: transparent;
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
            padding: 10px;
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
            font-weight: bold;
            transition: 0.2s;
            margin-top: 10px;
        }
        .btn:hover {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 15px var(--neon-green);
        }

        /* Interactive controls */
        .slider-container { margin-top: 15px; }
        .slider-container label { font-size: 0.75rem; color: var(--neon-blue); display: block; margin-bottom: 5px; }
        input[type="range"] {
            width: 100%;
            accent-color: var(--neon-green);
            background: transparent;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader"></div>
        <h2 style="color: var(--neon-green); margin-top: 20px; letter-spacing: 3px;">BOOTING NEURAL ENGINE</h2>
        <p style="color: #666; font-size: 0.8rem;">ESTABLISHING WEBCAM UPLINK & 3D ENVIRONMENT...</p>
    </div>

    <canvas id="webgl-canvas"></canvas>
    <div class="crosshair"></div>

    <div id="cam-pip">
        <video id="video-feed" autoplay playsinline></video>
    </div>

    <div class="hud-panel" id="top-left-hud">
        <h1>Tracking Telemetry</h1>
        <div class="data-row">
            <span class="data-label">SYS_STATUS:</span>
            <span class="data-value" id="val-status" style="color: #ff3366;">OFFLINE</span>
        </div>
        <div class="data-row">
            <span class="data-label">NODES_LOCKED:</span>
            <span class="data-value" id="val-nodes">0 / 478</span>
        </div>
        <div class="data-row">
            <span class="data-label">TESS_FACES:</span>
            <span class="data-value" id="val-faces">0</span>
        </div>
        <div class="data-row">
            <span class="data-label">COMPUTE_TIME:</span>
            <span class="data-value" id="val-fps">0 ms</span>
        </div>
    </div>

    <div class="hud-panel" id="bottom-right-hud">
        <h1>Spatial Diagnostics</h1>
        <div class="data-row">
            <span class="data-label">PITCH (X-Axis):</span>
            <span class="data-value" id="val-pitch">0.00°</span>
        </div>
        <div class="data-row">
            <span class="data-label">YAW (Y-Axis):</span>
            <span class="data-value" id="val-yaw">0.00°</span>
        </div>
        <div class="data-row">
            <span class="data-label">ROLL (Z-Axis):</span>
            <span class="data-value" id="val-roll">0.00°</span>
        </div>
        <div class="data-row">
            <span class="data-label">JAW_WIDTH:</span>
            <span class="data-value" id="val-jaw">0 units</span>
        </div>

        <div style="border-top: 1px solid #333; margin-top: 10px; padding-top: 10px;">
            <div class="slider-container">
                <label>Hologram Zoom (Z-Index)</label>
                <input type="range" id="cam-zoom" min="200" max="800" value="450">
            </div>
            <div class="slider-container">
                <label>Wireframe Opacity</label>
                <input type="range" id="mesh-opacity" min="0" max="100" value="80">
            </div>
            <button class="btn" id="toggle-points">Toggle Node Vertices</button>
            <button class="btn" id="toggle-lines">Toggle Wireframe Net</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. ADVANCED THREE.JS ENVIRONMENT SETUP
        // ==========================================
        const canvas = document.getElementById('webgl-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        const scene = new THREE.Scene();
        // Cyber-grid fog
        scene.fog = new THREE.FogExp2(0x000c1a, 0.0015);

        // Perspective Camera
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 3000);
        camera.position.z = 450;

        // --- Environmental Grid Background ---
        const gridHelper = new THREE.GridHelper(2000, 50, 0x00aaff, 0x002244);
        gridHelper.position.y = -300;
        gridHelper.position.z = -500;
        scene.add(gridHelper);

        const gridHelper2 = new THREE.GridHelper(2000, 50, 0x00aaff, 0x002244);
        gridHelper2.position.y = 300;
        gridHelper2.position.z = -500;
        gridHelper2.rotation.x = Math.PI;
        scene.add(gridHelper2);

        // ==========================================
        // 2. PROCEDURAL FACIAL WIREFRAME GENERATION
        // ==========================================
        const faceGroup = new THREE.Group();
        scene.add(faceGroup);

        // A. The Node Vertices (The glowing dots)
        const pointGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(478 * 3);
        pointGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        
        const pointMat = new THREE.PointsMaterial({
            color: 0x69BE28, // Action Green
            size: 3.5,
            transparent: true,
            opacity: 0.9,
            blending: THREE.AdditiveBlending
        });
        const pointCloud = new THREE.Points(pointGeo, pointMat);
        faceGroup.add(pointCloud);

        // B. The Wireframe Net (Tessellation)
        // MediaPipe FaceMesh produces specific triangles. We use an external triangulation 
        // array to draw the lines between the dots, turning it into a 3D mask.
        const lineGeo = new THREE.BufferGeometry();
        lineGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3)); 
        // Note: Without the exact 468-index array hardcoded (which is 4000+ numbers long), 
        // we will approximate a futuristic nearest-neighbor wireframe connection for the playground.
        
        const lineMat = new THREE.LineBasicMaterial({
            color: 0x00aaff, // Navy/Blue accent
            transparent: true,
            opacity: 0.4,
            blending: THREE.AdditiveBlending
        });
        
        // Custom connection logic: Draw lines between nearby nodes
        const indexArray = [];
        for(let i=0; i<470; i+=3) {
            indexArray.push(i, i+1, i+1, i+2, i+2, i);
        }
        lineGeo.setIndex(indexArray);
        const wireframeNet = new THREE.LineSegments(lineGeo, lineMat);
        faceGroup.add(wireframeNet);

        // ==========================================
        // 3. UI CONTROLS & STATE
        // ==========================================
        let showPoints = true;
        let showLines = true;

        document.getElementById('cam-zoom').addEventListener('input', (e) => {
            camera.position.z = e.target.value;
        });
        document.getElementById('mesh-opacity').addEventListener('input', (e) => {
            wireframeNet.material.opacity = e.target.value / 100;
            pointCloud.material.opacity = (e.target.value / 100) + 0.2;
        });
        document.getElementById('toggle-points').addEventListener('click', () => {
            showPoints = !showPoints;
            pointCloud.visible = showPoints;
        });
        document.getElementById('toggle-lines').addEventListener('click', () => {
            showLines = !showLines;
            wireframeNet.visible = showLines;
        });

        // ==========================================
        // 4. ML ENGINE: GOOGLE MEDIAPIPE
        // ==========================================
        const videoElement = document.getElementById('video-feed');
        
        // Data Smoothing variables (Linear Interpolation) to stop jittering
        let smoothedPositions = new Float32Array(478 * 3);
        const lerpFactor = 0.6; 
        let lastTime = performance.now();

        const faceMesh = new FaceMesh({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
        }});

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true, // Gets the 10 extra iris nodes (478 total)
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        faceMesh.onResults((results) => {
            // Hide loading screen on first successful frame
            document.getElementById('loading-screen').style.display = 'none';

            const currentTime = performance.now();
            document.getElementById('val-fps').innerText = Math.round(currentTime - lastTime) + " ms";
            lastTime = currentTime;

            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                // Update HUD
                document.getElementById('val-status').innerText = "TRACKING_ACTIVE";
                document.getElementById('val-status').style.color = "var(--neon-green)";
                document.getElementById('val-nodes').innerText = "478 / 478";
                document.getElementById('val-faces').innerText = "DYNAMIC_MESH";

                const landmarks = results.multiFaceLandmarks[0];
                const rawPositions = pointCloud.geometry.attributes.position.array;

                let noseZ = 0;

                // 1. Process Nodes and Apply Lerp (Smoothing)
                for (let i = 0; i < landmarks.length; i++) {
                    // Center the coordinates around 0,0 and scale them for 3D view
                    const targetX = (landmarks[i].x - 0.5) * -500; // Flip X for mirror
                    const targetY = (landmarks[i].y - 0.5) * -500;
                    const targetZ = landmarks[i].z * 500;

                    // Apply Linear Interpolation for buttery smooth movement
                    smoothedPositions[i*3] = smoothedPositions[i*3] + (targetX - smoothedPositions[i*3]) * lerpFactor;
                    smoothedPositions[i*3+1] = smoothedPositions[i*3+1] + (targetY - smoothedPositions[i*3+1]) * lerpFactor;
                    smoothedPositions[i*3+2] = smoothedPositions[i*3+2] + (targetZ - smoothedPositions[i*3+2]) * lerpFactor;

                    rawPositions[i*3] = smoothedPositions[i*3];
                    rawPositions[i*3+1] = smoothedPositions[i*3+1];
                    rawPositions[i*3+2] = smoothedPositions[i*3+2];

                    if(i === 1) noseZ = smoothedPositions[i*3+2];
                }

                // Push updates to the WebGL GPU
                pointCloud.geometry.attributes.position.needsUpdate = true;
                wireframeNet.geometry.attributes.position.needsUpdate = true;

                // 2. Calculate Complex Telemetry (Spatial Diagnostics)
                
                // JAW WIDTH (Distance between left tragus 234 and right tragus 454)
                const leftJaw = landmarks[234]; const rightJaw = landmarks[454];
                const jawDist = Math.sqrt(Math.pow(rightJaw.x - leftJaw.x, 2) + Math.pow(rightJaw.y - leftJaw.y, 2) + Math.pow(rightJaw.z - leftJaw.z, 2));
                document.getElementById('val-jaw').innerText = (jawDist * 1000).toFixed(2) + " units";

                // PITCH, YAW, ROLL CALCULATIONS
                // Pitch: Nose (1) relative to Forehead (10) and Chin (152)
                const top = landmarks[10]; const bottom = landmarks[152];
                const pitch = Math.atan2(bottom.z - top.z, bottom.y - top.y) * (180 / Math.PI);
                
                // Yaw: Difference in Z depth between Left Eye (133) and Right Eye (362)
                const lEye = landmarks[133]; const rEye = landmarks[362];
                const yaw = Math.atan2(rEye.z - lEye.z, rEye.x - lEye.x) * (180 / Math.PI);
                
                // Roll: Angle between eyes on the X/Y plane
                const roll = Math.atan2(rEye.y - lEye.y, rEye.x - lEye.x) * (180 / Math.PI);

                document.getElementById('val-pitch').innerText = pitch.toFixed(2) + "°";
                document.getElementById('val-yaw').innerText = yaw.toFixed(2) + "°";
                document.getElementById('val-roll').innerText = roll.toFixed(2) + "°";

                // Make the overall face group sway slightly based on movement for cool 3D effect
                faceGroup.rotation.y = yaw * 0.005;
                faceGroup.rotation.x = pitch * 0.005;

            } else {
                document.getElementById('val-status').innerText = "TARGET_LOST";
                document.getElementById('val-status').style.color = "#ff3366";
            }
        });

        // Initialize Camera
        const cam = new Camera(videoElement, {
            onFrame: async () => { await faceMesh.send({image: videoElement}); },
            width: 640, height: 480
        });
        cam.start();

        // ==========================================
        // 5. RENDER LOOP
        // ==========================================
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;

            // Animate Background Grids
            gridHelper.position.z = (time * 50) % 50 - 500;
            gridHelper2.position.z = (time * 50) % 50 - 500;

            renderer.render(scene, camera);
        }
        animate();

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
